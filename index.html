<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugadi</title>
    <style>
        body {
            height: 100svh;
            padding: 0;
            margin: 0;
        }

        #game-area {
            height: 200px;
            width: 100%;
            /* background-color: blue; */
            display: flex;
            justify-content: center;
            height: 100svh;
            position: relative;
            overflow: hidden;
        }

        #item-img {
            background-color: white;
            height: 100px;
            width: 100px;
            position: absolute;
            top: 10px;
            left: 0;
            animation: slideLeft-Right 2s linear infinite;
        }

        @keyframes slideLeft-Right {
            0% {
                left: 0;
            }

            50% {
                left: 80%;
            }

            100% {
                left: 0;
            }
        }

        @keyframes goDown {
            0% {
                top: 10px;
                opacity: 1;
                display: block;
            }

            90% {
                top: 100%;
            }

            96% {
                opacity: 0;
                display: none;
            }

            98% {
                top: 10px;
            }

            100% {
                display: block;
            }
        }

        #bowel {
            height: 200px;
            width: 200px;
            position: fixed;
            bottom: -30px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="game-area">
        <div id="item-img">
            <img width="100%" height="100%" src="" id="img-tag" />
        </div>
        <div id="bowel">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/066/167/050/small/elegant-gold-metal-bowl-luxury-empty-dish-shiny-golden-serving-bowl-kitchenware-png.png"
                height="100%" width="100%" />
        </div>
    </div>
    <div id="resultCard"
        style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff8e1; border: 5px solid #4caf50; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        <h2 style="color: #e65100;">Happy Ugadi! 🌿</h2>
        <p id="ugadiMessage" style="font-size: 1.2rem; color: #333;"></p>
        <button onclick="location.reload()"
            style="background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Play
            Again</button>
    </div>

</body>
<script>
    let gameArea = document.getElementById('game-area');
    let itemImg = document.getElementById('item-img');
    let imgTag = document.getElementById('img-tag');
    const widthWithScrollbar = window.innerWidth / 2 - 50;
    let totalScore = 0;
    let ImgsLink = [
        'https://img.freepik.com/premium-photo/medicinal-neem-flower-leaves-white-background_525574-2259.jpg?w=360',
        'https://static.vecteezy.com/system/resources/thumbnails/052/782/650/small/fresh-green-mango-fruit-with-slice-and-leaf-on-transparent-background-free-png.png',
        'https://kandrafoods.com/wp-content/uploads/2021/04/Jaggery.png',
        'https://static.vecteezy.com/system/resources/previews/050/593/620/non_2x/tamarind-with-slice-and-leaf-on-transparent-background-free-png.png',
        'https://pngimg.com/d/chili_pepper_PNG15.png',
        'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNcxpcNGz3JjmQppjt7HtP0cjLGjUeMBOLBA&s'
    ]
    let index = 0;
    imgTag.src = ImgsLink[index];
    gameArea.addEventListener('click', () => {
        index++;
        nextFun();

    })
    gameArea.addEventListener('keydown', (e) => {
        if (e.key == "Enter") {
            index++;
            nextFun();
        }
    })
    function nextFun() {
        console.log(widthWithScrollbar);

        let l1 = window.getComputedStyle(itemImg);
        let l2 = l1.getPropertyValue('left');
        console.log(l2);
        itemImg.style.left = l2;
        itemImg.style.animation = 'goDown 2s linear forwards'

        setTimeout(() => {
            if (index == 6) {
                gameOver();
            }
            itemImg.style.animation = 'slideLeft-Right 2s linear infinite'
            imgTag.src = ImgsLink[index];
        }, 1700);

        const diff = Math.abs(widthWithScrollbar - parseFloat(l2));
        const accuracy = (Math.max(0, 100 - (diff / widthWithScrollbar * 100))).toFixed(2);
        console.log(accuracy)
        totalScore += Number(accuracy);

    }
    function gameOver() {
        const finalPercentage = Math.round(totalScore / 6);
        const resultDiv = document.getElementById('resultCard');
        const messageText = document.getElementById('ugadiMessage');

        // Customize the message based on performance
        let taste = "";
        if (finalPercentage > 90) taste = "Perfectly balanced! 🍯 (Sweetness of Jaggery)";
        else if (finalPercentage > 60) taste = "Good mix! 🥭 (Tangy Mango)";
        else taste = "A bit bitter! 🌿 (Neem Flowers) - Practice more!";

        messageText.innerHTML = `Game Over!<br><b>Your Ugadi-Pachadi is ${finalPercentage}% complete.</b><br>${taste}`;

        // game area none
        gameArea.style.display = 'none';

        // Show the div
        resultDiv.style.display = 'block';

        // alert("Game Over! Your Accuracy: " + finalPercentage + "%");
        // location.reload();
    }
</script>

</html>
